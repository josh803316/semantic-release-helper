name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # semantic-release requires Node >=22.14.0 (Bun reports ~v20 for process.version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure .npmrc for GitHub Packages
        run: |
          echo "@josh803316:registry=https://npm.pkg.github.com" >> ~/.npmrc
          echo "//npm.pkg.github.com/:_authToken=${BUN_AUTH_TOKEN}" >> ~/.npmrc
        env:
          BUN_AUTH_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}

      - name: Install dependencies
        run: bun install
        env:
          HUSKY: 0
          BUN_AUTH_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}
          NPM_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}
          BUN_AUTH_TOKEN: ${{ secrets.BUN_AUTH_TOKEN }}
          SEMANTIC_RELEASE_PACKAGE: semantic-release-helper
          PUBLISH_TO_NPM: "true"
        run: npx semantic-release
